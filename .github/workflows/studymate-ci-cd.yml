name: StudyMate CI/CD

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: studymate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_mysql
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Lint PHP syntax
        run: |
          find . -type f -name "*.php" \
            -not -path "./node_modules/*" \
            -not -path "./vendor/*" \
            -print0 | xargs -0 -n1 php -l

      - name: Build React assets
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: studymate-build
          path: public/build/react
          if-no-files-found: error

  deploy:
    name: Deploy production by FTPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Validate deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          test -n "$FTP_SERVER"
          test -n "$FTP_USERNAME"
          test -n "$FTP_PASSWORD"
          test -n "$FTP_SERVER_DIR"

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload files by explicit FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate no
          set net:max-retries 3
          set net:timeout 30
          open -u "$FTP_USERNAME","$FTP_PASSWORD" -p 21 "$FTP_SERVER"
          mkdir -p "$FTP_SERVER_DIR"
          mirror --reverse --verbose --only-newer --parallel=4 \
            --exclude-glob .git/ \
            --exclude-glob .git/** \
            --exclude-glob .github/ \
            --exclude-glob .github/** \
            --exclude-glob node_modules/ \
            --exclude-glob node_modules/** \
            --exclude-glob .env \
            --exclude-glob .env.* \
            --exclude-glob config/*.local.php \
            --exclude-glob public/uploads/ \
            --exclude-glob public/uploads/** \
            --exclude-glob npm-debug.log* \
            ./ "$FTP_SERVER_DIR"
          bye
          EOF
